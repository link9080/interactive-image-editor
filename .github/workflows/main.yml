name: Node.js CI

on:
  push:
    branches: [ master ]
    
permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4 # リポジトリのコードを取得

    - name: Set up Node.js
      uses: actions/setup-node@v4 # Node.js環境をセットアップ
      with:
        node-version: '20.x' # 使用したいNode.jsのバージョンを指定
        cache: 'npm'

    - name: Install dependencies
      run: npm ci # package-lock.jsonに基づいて依存関係をインストール

    - name: Build project
      run: npm run build # package.jsonに定義されたビルドコマンドを実行
# --- 👇 ここから GitHub Pages 公開用のステップ ---
    - name: Setup Pages
      uses: actions/configure-pages@v5

    - name: Upload artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: './out' # Next.js が出力した静的ファイルのフォルダを指定

    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4